name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build archives
        run: ./scripts/release.sh "${GITHUB_REF_NAME}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
